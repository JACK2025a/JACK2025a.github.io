<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Flow</title>
    <style>
        :root {
            --primary-color: #007aff;
            --success-color: #2ecc71;
            --bg-color: #f9fbfd;
            --text-main: #2c3e50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 32px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
        }

        h2 {
            margin: 0 0 8px;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 15px;
            margin-bottom: 24px;
        }

        .status-area {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid #eee;
        }

        .device-info {
            font-weight: 600;
            color: var(--primary-color);
        }

        .redirect-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
            margin-bottom: 12px;
        }

        .redirect-btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .secondary-link {
            font-size: 14px;
            color: #999;
            text-decoration: none;
        }

        .secondary-link:hover {
            text-decoration: underline;
        }

        /* 动画 */
        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo-icon">📖</div>
        <h2>Vocab Flow</h2>
        <p>智能识别设备，为您开启最佳学习体验</p>

        <div class="status-area">
            检测到当前设备：<br>
            <span id="device-type" class="device-info">识别中...</span>
        </div>

        <div id="action-area">
            <div style="color: #888; font-size: 14px;">
                正在为您自动跳转<span class="loading-dots"></span>
            </div>
        </div>

        <div style="margin-top: 30px; border-top: 1px dashed #eee; padding-top: 20px;">
            <a href="#" id="manual-switch" class="secondary-link">手动切换至其他版本</a>
        </div>
    </div>

    <script>
        // --- 配置区域 ---
        const PC_URL = "https://jack2025a.github.io/Vocab.html";         // 电脑端文件名
        const PHONE_URL = "https://jack2025a.github.io/VocabM.html"; // 手机端文件名

        function detectDevice() {
            const ua = navigator.userAgent;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            return isMobile ? 'Mobile' : 'PC';
        }

        function startRedirect() {
            const device = detectDevice();
            const deviceSpan = document.getElementById('device-type');
            const manualLink = document.getElementById('manual-switch');
            
            if (device === 'Mobile') {
                deviceSpan.textContent = "📱 移动端 (手机/平板)";
                manualLink.textContent = "强制访问电脑版";
                manualLink.href = PC_URL;
                
                // 1.5秒后自动跳转
                setTimeout(() => {
                    window.location.href = PHONE_URL;
                }, 1500);
            } else {
                deviceSpan.textContent = "💻 桌面端 (PC/Mac)";
                manualLink.textContent = "切换到手机预览版";
                manualLink.href = PHONE_URL;

                setTimeout(() => {
                    window.location.href = PC_URL;
                }, 1500);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', startRedirect);
    </script>
</body>

</html>
